proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 自动选择
      - 🤖 AI 日本
      - 🤖 AI 新加坡
      - 🤖 AI 美国
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇸🇬 狮城节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🇰🇷 韩国节点
      - 🚀 手动切换
      - DIRECT
  - name: 🚀 手动切换
    include-all: true
    type: select
  - name: ♻️ 自动选择
    type: url-test
    include-all: true
    interval: 300
    tolerance: 50
  - name: 📲 电报消息
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - 🇸🇬 狮城节点
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🇰🇷 韩国节点
      - 🚀 手动切换
      - DIRECT
  # ========== AI 专用区域分组 ==========
  - name: 🤖 AI 日本
    include-all: true
    filter: (?i)(日本|JP|Japan).*(GM|GPT)|.*(GM|GPT).*(日本|JP|Japan)
    type: url-test
    interval: 600
    tolerance: 100

  - name: 🤖 AI 新加坡
    include-all: true
    filter: (?i)(新加坡|狮城|SG|Singapore).*(GM|GPT)|.*(GM|GPT).*(新加坡|狮城|SG|Singapore)
    type: url-test
    interval: 600
    tolerance: 100

  - name: 🤖 AI 美国
    include-all: true
    filter: (?i)(美|US|United States).*(GM|GPT)|.*(GM|GPT).*(美|US|United States)
    type: url-test
    interval: 600
    tolerance: 100

  - name: 💬 Ai平台
    type: select
    proxies:
      - 🤖 AI 日本
      - 🤖 AI 新加坡
      - 🤖 AI 美国
      - 🚀 节点选择
      - ♻️ 自动选择
      - 🇸🇬 狮城节点
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🇰🇷 韩国节点
      - 🚀 手动切换
      - DIRECT
  - name: 📹 油管视频
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
