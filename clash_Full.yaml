# ==================== 规则提供者 ====================
# 全面替换为 Loyalsoldier + blackmatrix7 规则集
# Loyalsoldier: 每日自动更新，误杀率极低，24k+ Stars
# blackmatrix7: 规则最全面，覆盖细分服务，24k+ Stars
# ==================================================

rule-providers:
  # ========== 基础规则（Loyalsoldier）==========
  # 私有网络/局域网
  private:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/private.txt"
    path: ./ruleset/private.yaml
    interval: 86400

  # 广告拦截（每日更新，10万+规则）
  reject:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt"
    path: ./ruleset/reject.yaml
    interval: 86400

  # 代理域名
